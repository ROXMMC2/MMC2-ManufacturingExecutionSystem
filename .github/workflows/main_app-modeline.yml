name: Build and deploy Node.js app to Azure Web App - app-modeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Instalar dependencias del backend
        working-directory: ./Backend
        run: npm install

      - name: Preparar carpeta de despliegue
        run: |
          mkdir deploy
          cp -r Backend/* deploy/

          if [ -d "App" ]; then cp -r App deploy/App; fi
          if [ -d "CSS" ]; then cp -r CSS deploy/CSS; fi
          if [ -d "JS" ]; then cp -r JS deploy/JS; fi
          if [ -d "Images" ]; then cp -r Images deploy/Images; fi

      - name: Subir artifact de despliegue
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Descargar artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Desplegar a Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-modeline
          slot-name: Production
          package: .
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}