<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Model Line - Login</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <!-- Tu CSS -->
  <link rel="stylesheet" href="../CSS/style.css?v=901" />
</head>

<body class="login-bg">

    <!-- Lado derecho login -->
    <div class="login-container">
      <div class="login-card">
        <div class="login-card-header">
          <div class="login-logo-circle">
            <i class="fa-solid fa-user-shield"></i>
          </div>

          <h2 class="login-title">Bienvenido</h2>
          <p class="login-subtitle">Inicia sesión para continuar en Model Line (Usuario y contraseña en mayúsculas)</p>
        </div>

        <form id="loginForm" class="login-form">
          <div class="mb-3">
            <label class="form-label login-label">Usuario</label>
            <div class="input-group login-input-group">
              <span class="input-group-text login-input-icon">
                <i class="fa-solid fa-user"></i>
              </span>
              <input
                id="usuario"
                type="text"
                class="form-control login-input"
                placeholder="Ingresa tu usuario"
                required
              />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label login-label">Contraseña</label>
            <div class="input-group login-input-group">
              <span class="input-group-text login-input-icon">
                <i class="fa-solid fa-lock"></i>
              </span>
              <input
                id="password"
                type="password"
                class="form-control login-input"
                placeholder="********"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn login-btn w-100 mt-3">
            <i class="fa-solid fa-right-to-bracket me-2"></i>
            Entrar
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="../JS/JavaScript.js"></script>
</body>
</html>
