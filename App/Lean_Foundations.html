<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Lean Foundations</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Tu CSS general -->
  <link rel="stylesheet" href="../CSS/style.css?v=3011" />
</head>

<body class="evaluation-page">

  <!-- TOPBAR -->
  <nav class="navbar bg-body-tertiary shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand" href="#">
        <img
          src="../Images/ROX 6 (1).png"
          alt="Logo ROX"
          width="100"
          height="65"
        />
      </a>

      <a class="navbar-brand" href="#">
        <img
          src="../Images/RA_Logo_Bug-LeftText_rgb.png"
          alt="Logo Rockwell Automation"
          width="150"
          height="55"
        />
      </a>
    </div>
  </nav>

  <!-- HEADER DEL MÓDULO -->
  <div class="container py-4">
    <div class="evaluation-header-card">
      <div class="row align-items-center g-3">
        <div class="col-md-2 text-center">
          <img
            id="R1"
            src="../Images/ROX 6 (1).png"
            alt="Lean Foundations"
            class="img-fluid evaluation-module-image"
          />
        </div>

        <div class="col-md-10">
          <div class="evaluation-header-content">
            <p class="evaluation-badge">Módulo 2</p>

            <h1 id="moduloNombre" class="evaluation-title">
              Lean Foundations
            </h1>

            <p class="evaluation-subtitle">
              Evalúa fundamentos lean, gestión visual, mejora continua, análisis de fallas
              y seguimiento de métricas del equipo.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- FORMULARIO DINÁMICO -->
  <div class="container pb-5">
    <div class="evaluation-wrapper">

      <!--
        CONTENEDOR DINÁMICO DE PREGUNTAS

        Este módulo carga automáticamente:
        - Módulo: 2
        - Preguntas: 9 a 16
        - Siguiente página: High_Performance_Teams.html

        Las preguntas se toman desde:
        http://localhost:3000/api/preguntas
      -->
      <div
        id="questionsContainer"
        data-module-id="2"
        data-module-name="Foundations"
        data-question-start="9"
        data-question-end="16"
        data-next-page="High_Performance_Teams.html"
      >
        <div class="alert alert-light border">
          Cargando preguntas...
        </div>
      </div>

      <!-- BOTONES -->
      <div class="evaluation-actions">
        <button
          id="btnDemo"
          type="button"
          class="btn btn-warning px-4"
        >
          Prueba
        </button>

        <button
          id="btnNextModule"
          type="button"
          class="btn btn-primary px-4"
        >
          Next
        </button>
      </div>

    </div>
  </div>

  <!-- JS PRINCIPAL -->
  <script src="../JS/JavaScript.js?v=3011"></script>

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
