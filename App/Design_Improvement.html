<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Improvement</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tu CSS -->
  <link rel="stylesheet" href="../CSS/style.css">
</head>
<body class="evaluation-page">

  <!-- TOPBAR -->
  <nav class="navbar bg-body-tertiary shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand" href="#">
        <img src="../Images/ROX 6 (1).png" alt="Logo1" width="100" height="65">
      </a>
      <a class="navbar-brand" href="#">
        <img src="../Images/RA_Logo_Bug-LeftText_rgb.png" alt="Logo2" width="150" height="55">
      </a>
    </div>
  </nav>

  <!-- HEADER DEL MÓDULO -->
  <div class="container py-4">
    <div class="evaluation-header-card">
      <div class="row align-items-center g-3">
        <div class="col-md-2 text-center">
          <img
            id="R1"
            src="../Images/Desing improvement.png"
            alt="Design Improvement"
            class="img-fluid evaluation-module-image"
          >
        </div>

        <div class="col-md-10">
          <div class="evaluation-header-content">
            <p class="evaluation-badge">Módulo 6</p>
            <h1 id="moduloNombre" class="evaluation-title">Design Improvement</h1>
            <p class="evaluation-subtitle">
              Evalúa la gestión visual del plan de producción y el uso de herramientas
              FTPC / tableros digitales para el seguimiento del desempeño de la línea.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- PREGUNTAS -->
  <div class="container pb-5">
    <div class="evaluation-wrapper">

      <div
        id="questionsContainer"
        data-module-id="6"
        data-module-name="Design Improvement"
        data-question-start="26"
        data-question-end="27"
        data-next-page=""
        data-final="true"
      >
        <div class="alert alert-light border">
          Cargando preguntas...
        </div>
      </div>

      <!-- BOTONES -->
      <div class="evaluation-actions">
      <button type="button" id="btnGuardarProgresoPreguntas" class="btn btn-outline-primary">
        <i class="fa-solid fa-floppy-disk"></i>
        Guardar progreso
      </button>
        </button>

        <button
          id="btnNextModule"
          type="button"
          class="btn btn-primary px-4"
        >
          Submit
        </button>
      </div>

    </div>
  </div>


  <!-- MODAL ÉXITO -->
  <div id="mensajeExito" class="overlay-exito" style="display:none;">
    <div class="mensaje-box-exito">
      <div class="icono-check-exito">✓</div>
      <h4 class="titulo-exito">Mensaje entregado con éxito</h4>
      <p class="texto-exito">Tu auditoría se guardó correctamente.</p>

      <button
        type="button"
        class="btn-cerrar-exito"
        onclick="cerrarMensajeExitoYRedirigir()"
      >
        Cerrar
      </button>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../JS/JavaScript.js"></script>
  <script src="../JS/progresopreguntas.js"></script>
</body>
</html>
